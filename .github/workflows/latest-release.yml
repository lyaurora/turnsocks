name: Latest Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: latest-release
  cancel-in-progress: true

jobs:
  release:
    name: Build and publish latest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: panel/ui/package-lock.json

      - name: Test
        run: make check

      - name: Build release assets
        run: make release

      - name: Publish latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_id="$(curl -fsSL "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/latest" | jq -r '.id' 2>/dev/null || true)"
          git tag -f latest "$GITHUB_SHA"
          git push -f origin latest
          if [ -n "$release_id" ] && [ "$release_id" != "null" ]; then
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/${release_id}"
          fi
          gh release create latest dist/* \
            --title "latest" \
            --notes "Automated latest build from ${GITHUB_SHA}." \
            --latest
